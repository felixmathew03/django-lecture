<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Edit Student</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Enter name" value="{{student.name}}"> <br><br>
        <input type="number" name="age" placeholder="Enter age" value="{{student.age}}"> <br><br>
        <input type="email" name="email" placeholder="Enter email" value="{{student.email}}"> <br><br>
        <input type="text" name="course" placeholder="Enter course" value="{{student.course}}"> <br><br>
        <button type="submit">Edit changes</button>
    </form>
</body>
</html>
